version: "3.9"

services:
  db:
    image: postgres:15
    container_name: nuu-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: nuu-backend
    ports:
      - "5050:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_ROW_LIMIT: ${DB_ROW_LIMIT}
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - MODE=${BUILD_MODE}
    container_name: nuu-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend
    env_file:
      - .env
    restart: always

volumes:
  pgdata:
